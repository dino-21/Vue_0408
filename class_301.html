<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Vue CDN JSON 테이블</title>

  <!-- Vue CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    table {
      border-collapse: collapse;
      width: 500px;
      margin-top: 15px;
    }

    th, td {
      border: 1px solid #999;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #f2f2f2;
    }

    input {
      width: 300px;
      padding: 8px;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <div id="app">
    <h2>학생 목록</h2>

    <!-- 검색 input -->
    <input
      type="text"
      v-model="keyword"
      placeholder="Search..."
    >

    <!-- 테이블 -->
    <table v-if="filteredList.length > 0">
      <thead>
        <tr>
          <th>번호</th>
          <th>이름</th>
          <th>성별</th>
          <th>나이</th>
        </tr>
      </thead>
      <tbody>
        <tr v-for="student in filteredList" :key="student.id">
          <td>{{ student.id }}</td>
          <td>{{ student.name }}</td>
          <td>{{ student.gender }}</td>
          <td>{{ student.age }}</td>
        </tr>
      </tbody>
    </table>

    <p v-else>데이터가 없습니다.</p>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          students: [],
          keyword: ""
        };
      },
      computed: {
        filteredList() {
          return this.students.filter(student =>
            Object.values(student).some(value =>
              String(value).toLowerCase().includes(this.keyword.toLowerCase())
            )
          );
        }
      },
      mounted() {
        fetch("https://dino-21.github.io/Vue_0408/class_301.json")
          .then(response => response.json())
          .then(data => {
            this.students = data;
          })
          .catch(error => {
            console.error("JSON 불러오기 실패:", error);
          });
      }
    }).mount("#app");
  </script>

</body>
</html>
